# B5 / ADR-0022 layer 3 — CI backstop, no AWS credentials required.
#
# Two independent guards run on every PR into main (and pushes to main):
#   1. terraform fmt -check + validate — offline (init -backend=false), so it needs no cloud
#      access and no state. Catches formatting drift and config errors before review.
#   2. gitleaks — full-history secret scan. Server-side backstop for the local pre-commit gate
#      (.pre-commit-config.yaml) and GitHub push protection: a hook bypassed with --no-verify
#      still surfaces here. Pinned to the same gitleaks version as the pre-commit hook.
#
# This workflow also stands up the Actions skeleton that Wk 2 (dlt ingest) builds on.
name: terraform-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    name: fmt + validate (offline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      # fmt across the whole tree (recursive) so nested dirs (e.g. sql/) are covered.
      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      # Offline validate: no backend, no provider credentials, no state.
      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the PR tip.
          fetch-depth: 0

      # Pin to the pre-commit hook's version (.pre-commit-config.yaml) for parity. Download the
      # binary directly rather than the marketplace action to avoid its org-license/telemetry
      # path — the CLI is Apache-2.0 and free for any use.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
